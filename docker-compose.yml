services:
  jekyll:
    build: .
    container_name: tytosmag_jekyll
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
    environment:
      JEKYLL_ENV: development
      HOME: /tmp
    command: bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling
