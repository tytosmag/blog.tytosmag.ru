name: Build and Deploy Blog

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Generate Giscus config
        run: |
          cat > _config.giscus.yml <<EOF
          comments:
            provider: giscus

            giscus:
              repo: "${GISCUS_REPO}"
              repo_id: "${GISCUS_REPO_ID}"
              category: "${GISCUS_CATEGORY}"
              category_id: "${GISCUS_CATEGORY_ID}"
              mapping: pathname
              strict: 0
              reactions_enabled: 1
              input_position: bottom
              lang: ru
              theme: dark
          EOF
        env:
          GISCUS_REPO: ${{ vars.GISCUS_REPO }}
          GISCUS_REPO_ID: ${{ vars.GISCUS_REPO_ID }}
          GISCUS_CATEGORY: ${{ vars.GISCUS_CATEGORY }}
          GISCUS_CATEGORY_ID: ${{ vars.GISCUS_CATEGORY_ID }}

      - name: Build site with Jekyll
        run: bundle exec jekyll build --config _config.yml,_config.giscus.yml
        env:
          JEKYLL_ENV: production

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
